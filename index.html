<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign-up Form</title>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="sidebar">
      <div class="odin-bar">
        <img
          src="images/odin-logo.png"
          alt="Odin logo"
          width="100"
          height="100"
        />
        <h1>ODIN</h1>
      </div>
      <div class="citation">
        Photo by
        <a href="https://unsplash.com/@therawhunter">Massimiliano Morosinotto</a> on
        <a href="https://unsplash.com/photos/gray-mountain-during-daytime-photo-3i5PHVp1Fkw">Unsplash</a>
      </div>
    </div>
    <div class="content">
      <div class="intro">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
      </div>
      <div class="form-block">
        <form>
          <p>Let's do this!</p>
          <div class="form-row">
            <div class="form-input">
              <label for="first-name">FIRST NAME</label>
              <input type="text" name="first-name" id="first-name" required />
            </div>
            <div class="form-input">
              <label for="last-name">LAST NAME</label>
              <input type="text" name="last-name" id="last-name" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-input">
              <label for="email">EMAIL</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div class="form-input">
              <label for="phone">PHONE NUMBER</label>
              <input id="phone" name="phone" type="tel" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-input">
              <label for="pwd">PASSWORD</label>
              <input type="password" id="pwd" name="password" required />
            </div>
            <div class="form-input">
              <label for="confirm-pwd">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm-pwd"
                name="confirm-password"
                required
              />
            </div>
          </div>
        </form>
      </div>
      <div class="footer">
        <button type="button" class="create">Create Account</button>
        <p>Already have an account? <a href="#">Log in</a></p>
      </div>
    </div>
  </body>
</html>
